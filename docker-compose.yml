services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: narrativesignal-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - PORT=8000
      - DATA_PATH=/app/data
      - FRONTEND_ORIGINS=http://localhost:3000,https://YOUR_FRONTEND_DOMAIN
    volumes:
      - ./data:/app/data
      - ./outputs:/app/backend/outputs
      - ./logs:/app/backend/logs
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
